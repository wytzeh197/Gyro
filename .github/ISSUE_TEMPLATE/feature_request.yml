name: Feature request
description: Suggest a product or developer-experience improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues first. For large changes, explain the user problem before proposing implementation details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should Gyro improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - Desktop app
        - Core engine
        - Release/install
        - Documentation
        - Other
    validations:
      required: true
