name: Bug report
description: Report a reproducible problem in Gyro.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, app actions, workspace shape, and expected vs actual behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gyro version
      placeholder: "0.1.0"
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
