name: Bug report
description: Report a reproducible problem in Gyro.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Gyro. Do not report vulnerabilities or include credentials or private source code here; follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, app actions, workspace shape, and expected vs actual behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gyro version
      placeholder: "0.1.0"
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Desktop app
        - CLI
        - Both app and CLI
        - Build or installation
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Include relevant output after removing tokens, private paths, source code, and session content.
